<ion-content fullscreen>

  <!-- ==========================================
       CONTENEDOR PRINCIPAL
  ========================================== -->

  <div class="login-container">

    <!-- ==========================================
         IMAGEN SUPERIOR
    ========================================== -->

    <div class="login-banner">

      

    </div>

    <!-- ==========================================
         TARJETA LOGIN
    ========================================== -->

    <div class="login-card">

      <!-- ==========================================
           LOGO
      ========================================== -->

      <div class="logo-section">

        <img
          src="assets/kaddakrestaurant11.jpg"
          alt="Logo Kaddak"
          class="logo">

      </div>

      <!-- ==========================================
           BIENVENIDA
      ========================================== -->

      <div class="welcome-section">

        <h2 class="title">

          Bienvenido

        </h2>

        <p class="subtitle">

          Inicia sesión para continuar

        </p>

      </div>

      <!-- ==========================================
           FORMULARIO
      ========================================== -->

      <form class="login-form">

        <ion-item class="input-item">

          <ion-input
            label="Usuario"
            labelPlacement="floating"
            type="email"
            [(ngModel)]="email"
            name="email">

          </ion-input>

        </ion-item>

        <ion-item class="input-item">

          <ion-input
            label="Contraseña"
            labelPlacement="floating"
            type="password"
            [(ngModel)]="password"
            name="password">

          </ion-input>

        </ion-item>

      </form>

      <!-- ==========================================
           RECUPERAR CONTRASEÑA
      ========================================== -->

      <div class="forgot-password">
       <!-- forgotpassword()-->
        <a>

          ¿Olvidaste tu contraseña?

        </a>

      </div>

      <!-- ==========================================
           BOTÓN LOGIN
      ========================================== -->

      <div class="button-section">

        <ion-button
          expand="block"
          class="login-button"
          (click)="login()">

          Iniciar sesión

        </ion-button>

      </div>

      <!-- ==========================================
           DIVISOR
      ========================================== -->

      <div class="divider">

        <span>

          o continúa con

        </span>

      </div>

      <!-- ==========================================
           REDES SOCIALES
      ========================================== -->

      <div class="social-login">

        <button class="social-button">

          <img
            src="assets/google-icon.png"
            alt="Google">

        </button>

        <button class="social-button">

          <img
            src="assets/facebookicono.png"
            alt="Facebook">

        </button>

        <button class="social-button">

          <img
            src="assets/appleicono.png"
            alt="Apple">

        </button>

      </div>

      <!-- ==========================================
           REGISTRO
      ========================================== -->

      <div class="register-section">

        <span>

          ¿No tienes cuenta?

        </span>

        <a (click)="registers()">

          Regístrate

        </a>

      </div>

    </div>

  </div>

</ion-content>
