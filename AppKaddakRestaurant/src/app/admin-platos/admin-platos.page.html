<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Admin: Platos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div style="padding: 20px;">
    <h2 style="font-weight: 800; font-size: 24px; color: #1c1c1c; margin-bottom: 15px;">
      {{ modoEdicion ? 'Editar Plato' : 'Nuevo Plato' }}
    </h2>
    
    <ion-card style="margin: 0 0 20px 0; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
      <ion-card-content>
        <ion-item lines="full">
          <ion-label position="floating" style="color: #666;">Nombre del Plato</ion-label>
          <ion-input type="text" [(ngModel)]="platoActual.nombre_comida"></ion-input>
        </ion-item>

        <ion-item lines="full">
          <ion-label position="floating" style="color: #666;">Descripción</ion-label>
          <ion-input type="text" [(ngModel)]="platoActual.descripcion"></ion-input>
        </ion-item>

        <ion-item lines="full">
          <ion-label position="floating" style="color: #666;">Precio ($)</ion-label>
          <ion-input type="number" [(ngModel)]="platoActual.precio"></ion-input>
        </ion-item>

        <ion-item lines="full">
          <ion-label position="stacked" style="color: #666;">Categoría</ion-label>
          <ion-select [(ngModel)]="platoActual.id_categoria" placeholder="Selecciona una categoría">
            <ion-select-option *ngFor="let cat of categorias" [value]="cat.id">
              {{ cat.nombre_categoria }}
            </ion-select-option>
          </ion-select>
        </ion-item>

        <ion-item lines="none">
          <ion-label position="stacked" style="color: #666;">Foto del Plato</ion-label>
          <div style="margin-top: 10px; padding: 10px; border: 1px dashed #ccc; border-radius: 8px;">
            <input type="file" (change)="onFileSelected($event)" accept="image/*">
          </div>
        </ion-item>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
          <ion-button expand="block" color="primary" style="flex: 1; --border-radius: 10px;" (click)="guardarPlato()">
            {{ modoEdicion ? 'Actualizar' : 'Guardar' }}
          </ion-button>
          <ion-button expand="block" color="medium" style="flex: 1; --border-radius: 10px;" *ngIf="modoEdicion" (click)="resetForm()">
            Cancelar
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <h2 style="font-weight: 800; font-size: 20px; color: #1c1c1c; margin-top: 30px;">Platos Existentes</h2>
    
    <ion-list style="background: transparent;">
      <ion-item *ngFor="let comida of comidas" style="--background: white; --border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.03);">
        <ion-label>
          <h3 style="font-weight: 700; color: #333;">{{ comida.nombre_comida }}</h3>
          <p style="color: #ff4757; font-weight: 700;">${{ comida.precio }}</p>
        </ion-label>
        <div slot="end" style="display: flex; gap: 8px;">
          <ion-button size="small" color="dark" (click)="editarPlato(comida)">Editar</ion-button>
          <ion-button size="small" color="danger" fill="outline" (click)="eliminarPlato(comida.id)">Borrar</ion-button>
        </div>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
